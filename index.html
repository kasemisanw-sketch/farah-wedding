<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>فرحنا</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#fff0f5, #ffe4e1);
    margin: 0;
}

h1 { color: #d63384; }

.section {
    margin: 40px;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 320px;
    border-radius: 20px;
    box-shadow: 0 0 15px #ccc;
}

img {
    width: 90%;
    border-radius: 15px;
    margin: 10px 0;
}

button {
    background: #d63384;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="card">
    <h1>💍 دعوة فرح</h1>
    <h2>أحمد & فاطمة</h2>
    <p>📅 20 أكتوبر 2026</p>
    <p>📍 قاعة النور</p>
</div>

<!-- عداد -->
<div class="section">
    <h2>⏳ العد التنازلي</h2>
    <h3 id="countdown"></h3>
</div>

<!-- صور -->
<div class="section">
    <h2>📸 صورنا</h2>
    <img src="https://i.imgur.com/1.jpg">
    <img src="https://i.imgur.com/2.jpg">
</div>

<!-- خريطة -->
<div class="section">
    <h2>📍 المكان</h2>
    <iframe 
    src="https://www.google.com/maps?q=القاهرة&output=embed"
    width="90%" height="250" style="border:0;"></iframe>
</div>

<!-- موسيقى -->
<div class="section">
    <h2>🎵 موسيقى</h2>
    <audio controls autoplay loop>
        <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
    </audio>
</div>

<!-- RSVP -->
<div class="section">
    <h2>💬 تأكيد الحضور</h2>
    <button onclick="rsvp()">هحضر ❤️</button>
    <p id="msg"></p>
</div>

<script>
// عداد
var weddingDate = new Date("Oct 20, 2026 20:00:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var diff = weddingDate - now;

    var days = Math.floor(diff / (1000 * 60 * 60 * 24));
    var hours = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));

    document.getElementById("countdown").innerHTML =
        days + " يوم و " + hours + " ساعة";
}, 1000);

// RSVP
function rsvp(){
    document.getElementById("msg").innerHTML = "🎉 تم تسجيل حضورك!";
}
</script>

</body>
</html>
