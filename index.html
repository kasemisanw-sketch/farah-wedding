<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohamed & Hoda Wedding</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom, #fff0f5, #ffe4e1);
    color: #333;
    text-align: center;
    scroll-behavior: smooth;
}

/* Hero */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: fadeIn 2s ease;
}

.hero h1 {
    font-size: 40px;
    color: #d63384;
}

.hero p {
    margin-top: 10px;
    font-size: 18px;
}

/* Sections */
.section {
    padding: 60px 20px;
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}

.section.show {
    opacity: 1;
    transform: translateY(0);
}

/* Card */
.card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: auto;
}

/* Countdown */
#countdown {
    font-size: 22px;
    margin-top: 10px;
    color: #d63384;
}

/* Gallery */
.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

.gallery img {
    width: 100%;
    max-width: 250px;
    border-radius: 15px;
    transition: 0.4s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* Button */
button {
    background: #d63384;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 10px;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #b0256b;
}

/* Animations */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>
</head>

<body>

<!-- Hero -->
<div class="hero">
    <h1>Mohamed & Hoda 💍</h1>
    <p>We Are Getting Married</p>
</div>

<!-- Countdown -->
<div class="section">
    <div class="card">
        <h2>⏳ Countdown</h2>
        <div id="countdown"></div>
    </div>
</div>

<!-- Gallery -->
<div class="section">
    <h2>📸 Our Moments</h2>
    <div class="gallery">
        <img src="https://i.imgur.com/1.jpg">
        <img src="https://i.imgur.com/2.jpg">
        <img src="https://i.imgur.com/3.jpg">
    </div>
</div>

<!-- RSVP -->
<div class="section">
    <div class="card">
        <h2>💬 RSVP</h2>
        <input type="text" id="name" placeholder="Your Name" 
        style="padding:10px;border-radius:10px;border:1px solid #ccc;width:80%;">
        <br>
        <button onclick="rsvp()">Confirm حضور</button>
        <p id="msg"></p>
    </div>
</div>

<script>
// Countdown
var weddingDate = new Date("Oct 17, 2027 20:00:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var diff = weddingDate - now;

    var days = Math.floor(diff / (1000*60*60*24));
    var hours = Math.floor((diff % (1000*60*60*24))/(1000*60*60));
    var mins = Math.floor((diff % (1000*60*60))/(1000*60));

    document.getElementById("countdown").innerHTML =
        days + " Days " + hours + " Hours " + mins + " Min";
}, 1000);

// Scroll Animation
window.addEventListener("scroll", function(){
    document.querySelectorAll(".section").forEach(sec => {
        var top = sec.getBoundingClientRect().top;
        if(top < window.innerHeight - 100){
            sec.classList.add("show");
        }
    });
});

// RSVP
function rsvp(){
    var name = document.getElementById("name").value;
    document.getElementById("msg").innerHTML =
        "🎉 Thanks " + name + " for confirming!";
}
</script>

</body>
</html>
